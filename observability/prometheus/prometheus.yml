global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'ingestor-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ingestor:8082']

  - job_name: 'processor-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['processor:8083']

  - job_name: 'dashboard-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['dashboard:8080']
