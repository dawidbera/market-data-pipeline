<div class="min-h-screen bg-slate-950 text-slate-200 font-sans">
  <!-- Header -->
  <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white shadow-lg shadow-blue-500/20">
          M
        </div>
        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">
          Market Data Pipeline
        </h1>
      </div>
      <div class="flex items-center gap-4 text-sm text-slate-400">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-green-500"></span>
          System Online
        </div>
        <div>
          {{ now | date:'medium' }}
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container mx-auto p-4 md:p-6 space-y-6">
    
    <!-- Metrics Cards -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div class="bg-slate-900 p-4 rounded-lg border border-slate-800">
        <div class="text-slate-500 text-xs uppercase font-semibold tracking-wider mb-1">Status</div>
        <div class="text-green-400 font-medium flex items-center gap-2">
          <span class="animate-pulse">●</span> Operational
        </div>
      </div>
      <div class="bg-slate-900 p-4 rounded-lg border border-slate-800">
         <div class="text-slate-500 text-xs uppercase font-semibold tracking-wider mb-1">Symbol / Price</div>
         <div class="flex items-baseline gap-2">
           <span class="text-slate-200 font-bold text-lg">{{ symbol() }}</span>
           <span class="text-cyan-400 font-mono text-sm" *ngIf="price() > 0">${{ price() | number:'1.2-2' }}</span>
         </div>
      </div>
      <div class="bg-slate-900 p-4 rounded-lg border border-slate-800">
         <div class="text-slate-500 text-xs uppercase font-semibold tracking-wider mb-1">Latency</div>
         <div class="text-blue-400 font-mono">{{ latency }} ms</div>
      </div>
      <div class="bg-slate-900 p-4 rounded-lg border border-slate-800">
         <div class="text-slate-500 text-xs uppercase font-semibold tracking-wider mb-1">Throughput</div>
         <div class="text-purple-400 font-mono">~{{ throughput }} req/s</div>
      </div>
    </div>

    <!-- Dashboard Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <!-- Chart Section (Takes up 2/3) -->
      <div class="lg:col-span-2 space-y-2">
         <h2 class="text-lg font-semibold text-slate-300">Live Market Data</h2>
         <app-chart></app-chart>
      </div>

      <!-- Alerts Section (Takes up 1/3) -->
      <div class="lg:col-span-1 space-y-2">
        <h2 class="text-lg font-semibold text-slate-300">Anomaly Detection</h2>
        <app-alerts></app-alerts>
      </div>
      
    </div>

  </main>
</div>

<router-outlet />
